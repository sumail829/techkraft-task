version: "3.8"

services:
  backend:
    build: ./backend
    restart: always
    ports:
      - "6000:6000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
  
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: samir
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: techkraftdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  pgdata:

